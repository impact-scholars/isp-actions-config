name: build and deploy MyST paper (pages for main, cloudflare for previews)

on:
  workflow_call:
    inputs:
      target:
        description: "'pages' for GitHub Pages or 'cloudflare' for Cloudflare Pages preview"
        required: false
        type: string
        default: "pages"
      paper-environment-file:
        description: "Name of the paper-specific environment file (optional)"
        required: false
        type: string
        default: "paper-environment.yml"
      base_url:
        description: "Where the website is served from, including CSS & JS assets (needed for MyST)"
        required: false
        type: string
        default: "/${{ github.event.repository.name }}"
      cf-project-name:
        description: "Cloudflare Pages project name for preview deployments"
        required: false
        type: string
        default: "impact-scholars"
    secrets:
      CLOUDFLARE_API_TOKEN:
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        required: false

env:
  BASE_URL: ${{ inputs.base_url }}
  BASE_ENV_VERSION: v0.1.0

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write
  deployments: write

concurrency:
  group: ${{ inputs.target == 'pages' && 'pages' || format('preview-{0}', github.head_ref) }}
  cancel-in-progress: ${{ inputs.target == 'cloudflare' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        if: inputs.target == 'pages'
        uses: actions/configure-pages@v3

      - name: Fetch base environment file
        run: |
          curl -fsSL https://raw.githubusercontent.com/impact-scholars/isp-actions-config/${{ env.BASE_ENV_VERSION }}/environment.yml -o base-environment.yml

      - name: Setup Micromamba with base environment
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: base-environment.yml
          generate-run-shell: true
          cache-environment: true
          cache-downloads: true

      - name: Install paper-specific packages
        run: |
          if [ -f "${{ inputs.paper-environment-file }}" ]; then
            echo "Found ${{ inputs.paper-environment-file }}, installing paper-specific packages..."
            micromamba install --file ${{ inputs.paper-environment-file }} --yes
          else
            echo "No ${{ inputs.paper-environment-file }} found, skipping paper-specific packages"
          fi
        shell: micromamba-shell {0}

      - name: MyST build exports (PDF, Typst)
        run: myst build --all
        shell: micromamba-shell {0}

      - name: MyST build HTML
        run: myst build --html
        shell: micromamba-shell {0}

      - name: Upload Pages artifact
        if: inputs.target == 'pages'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_build/html"

      - name: Deploy to Cloudflare Pages
        if: inputs.target == 'cloudflare'
        id: cf-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _build/html --project-name=${{ inputs.cf-project-name }} --branch=paper-${{ github.event.repository.name }}-${{ github.event.pull_request.number }}

      - name: Comment preview URL on PR
        if: inputs.target == 'cloudflare'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          message: |
            Preview deployed!
            ${{ steps.cf-deploy.outputs.deployment-url }}

  deploy-pages:
    if: inputs.target == 'pages'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
